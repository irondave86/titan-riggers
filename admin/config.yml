backend:
  name: github
  repo: irondave86/titan-riggers
  branch: main
  base_url: https://titan-riggers.vercel.app
  auth_endpoint: /api/cms/auth/authorize

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "site"
    label: "Site Content"
    files:
      - file: "content/site.json"
        label: "Homepage Content"
        name: "homepage"
        fields:
          - { label: Business Name, name: businessName, widget: string }
          - { label: Tagline, name: tagline, widget: string }
          - { label: Hero Headline, name: heroHeadline, widget: text }
          - { label: Hero Subhead, name: heroSubhead, widget: text }
          - { label: Phone, name: phone, widget: string }
          - { label: Email, name: email, widget: string }
